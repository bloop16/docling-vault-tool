# CI: Lint + Tests auf allen unterstuetzten Python-Versionen, plus Paket-Build.
# Docling wird bewusst NICHT installiert: die Testsuite stubbt es (tests/
# conftest.py), dadurch bleibt die CI schlank (kein Torch-Download).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt streamlit ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Paket bauen und prüfen
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
