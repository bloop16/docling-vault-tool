# Basis-Theme fuer das Docling Vault Tool (dunkel, technisch).
# Feinschliff (Hero, Feature-Karten, Pipeline) passiert per CSS in app_streamlit.py.
[theme]
base = "dark"
primaryColor = "#7c8cff"
backgroundColor = "#0b0f17"
secondaryBackgroundColor = "#121a28"
textColor = "#e6edf3"
font = "sans serif"

[server]
# Grosse Vaults: Upload-/Message-Limits grosszuegig setzen.
maxUploadSize = 2048

[browser]
gatherUsageStats = false
